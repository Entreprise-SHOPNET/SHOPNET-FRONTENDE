

// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "33.0.2"
        minSdkVersion = 24
        compileSdkVersion = 33
        targetSdkVersion = 33
        kotlinVersion = "1.9.10"  // Kotlin stable pour RN 0.72+
        ndkVersion = "26.1.10909125"
    }

    repositories {
        google()
        mavenCentral()
        maven { url "https://www.jitpack.io" }
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.1.0")          // Gradle compatible
        classpath("com.facebook.react:react-native-gradle-plugin:0.74.6") // Version RN stable
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://www.jitpack.io" }
    }
}

// ---------------------------
// Kotlin config pour tous les modules
// ---------------------------
subprojects {
    afterEvaluate { project ->
        project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).all { task ->
            task.kotlinOptions {
                jvmTarget = "1.8"
                freeCompilerArgs += ["-Xskip-prerelease-check", "-Xsuppress-version-warnings"]
            }
        }
    }
}

// ---------------------------
// Optionnel : mémoire Gradle
// ---------------------------
gradle.projectsEvaluated {
    tasks.withType(JavaCompile) {
        options.fork = true
        options.forkOptions.memoryMaximumSize = "2g"
    }
}
