

// android/build.gradle (root, prêt pour SDK 52 et RN 0.74+)

buildscript {
    ext {
        buildToolsVersion = "35.0.1"      // Compatible avec SDK 52
        minSdkVersion = 24
        compileSdkVersion = 52
        targetSdkVersion = 52
        kotlinVersion = "1.9.10"          // Stable pour RN 0.74+
        ndkVersion = "26.1.10909125"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.1.0")                       // Gradle compatible RN 0.74+
        classpath("com.facebook.react:react-native-gradle-plugin:0.74.6")      // Plugin React Native stable
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")  // Kotlin stable
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// ---------------------------
// Configuration Kotlin pour tous les modules
// ---------------------------
subprojects {
    afterEvaluate { project ->
        project.tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).all { task ->
            task.kotlinOptions {
                jvmTarget = "1.8"
                freeCompilerArgs += ["-Xskip-prerelease-check", "-Xsuppress-version-warnings"]
            }
        }
    }
}

// ---------------------------
// Optimisation mémoire Gradle
// ---------------------------
gradle.projectsEvaluated {
    tasks.withType(JavaCompile) {
        options.fork = true
        options.forkOptions.memoryMaximumSize = "2g"
    }
}
